  <path d="M9.2 3.5Q8.8 2.2 9.5 1.5" fill="none" stroke="context-fill" stroke-width="0.55" stroke-linecap="round"/>
  <path d="M10 3.2Q10 2 10.7 1.3" fill="none" stroke="context-fill" stroke-width="0.55" stroke-linecap="round"/>
  <path d="M10.8 3.3Q11.2 2.3 11.7 1.8" fill="none" stroke="context-fill" stroke-width="0.5" stroke-linecap="round"/>
  <!-- Feet -->
  <path d="M6.5 11.8L6.2 13.2L5.5 13.8M6.2 13.2L6.6 13.8" fill="none" stroke="context-fill" stroke-width="0.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M8.5 11.5L8.2 13L7.5 13.6M8.2 13L8.6 13.6" fill="none" stroke="context-fill" stroke-width="0.5" stroke-linecap="round" stroke-linejoin="round"/>
