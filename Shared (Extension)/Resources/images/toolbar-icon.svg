  <path d="M1.8 10.8Q1 11.5 0.8 12.8Q1.5 12 2.2 11.8L3 10.5Z" fill="context-fill" opacity="0.85"/>
  <path d="M2.3 11.2Q1.8 12.2 1.5 13.3Q2.3 12.5 2.8 12L3.3 10.8Z" fill="context-fill" opacity="0.8"/>
  <!-- Body -->
  <path d="M3 10.5Q2.5 9 3.5 7.5L5.5 6L7.5 5.8L9.5 6.5L10.5 7.5Q10.8 9 10 10.5L8 11.5L5.5 12L3 10.5Z" fill="context-fill"/>
  <!-- Wing detail -->
  <path d="M3.8 8.5Q3.2 7.5 3.8 6.8L5.5 6.2L7 6.5L8 7.5L7.5 9L5.5 10L3.8 8.5Z" fill="context-fill" opacity="0.7"/>
  <!-- Head -->
  <circle cx="10.5" cy="5" r="2.4" fill="context-fill"/>
  <!-- Eye -->
  <circle cx="11.3" cy="4.7" r="0.8" fill="context-stroke"/>
  <circle cx="11.5" cy="4.55" r="0.3" fill="context-fill"/>
